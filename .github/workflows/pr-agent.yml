name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr-agent:
    if: >-
      ${{
        github.event.sender.type != 'Bot' &&
        (
          github.event_name == 'pull_request' ||
          github.event.issue.pull_request
        )
      }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write

    steps:
      - name: Validate PR Agent configuration
        env:
          API_BASE: ${{ vars.PR_AGENT_OPENAI_API_BASE }}
          MODEL: ${{ vars.PR_AGENT_MODEL }}
        run: |
          echo "repository=$GITHUB_REPOSITORY"
          echo "event=$GITHUB_EVENT_NAME"

          if [ -z "$API_BASE" ]; then
            echo "::error::PR_AGENT_OPENAI_API_BASE is not available"
            exit 1
          fi

          echo "API_BASE=$API_BASE"
          echo "MODEL=${MODEL:-glm-5.2}"

      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          CONFIG__MODEL: ${{ vars.PR_AGENT_MODEL || 'openai/glm-5.2' }}
          CONFIG__FALLBACK_MODELS: ${{ vars.PR_AGENT_FALLBACK_MODELS || '["openai/deepseek-v4-flash"]' }}

          OPENAI__API_BASE: ${{ vars.PR_AGENT_OPENAI_API_BASE }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_OPENAI_API_KEY }}

          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "false"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG__PR_ACTIONS: '["opened","reopened","ready_for_review","review_requested"]'
          GITHUB_ACTION_CONFIG__HANDLE_PUSH_TRIGGER: "true"
          GITHUB_ACTION_CONFIG__PUSH_COMMANDS: '["/review"]'