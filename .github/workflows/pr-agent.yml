name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr-agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: ${{ vars.PR_AGENT_MODEL || 'glm-5.2' }}
          OPENAI__API_BASE: ${{ vars.PR_AGENT_OPENAI_API_BASE || 'https://open.bigmodel.cn/api/coding/paas/v4' }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_OPENAI_API_KEY }}
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened","reopened","ready_for_review","review_requested"]'
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_commands: '["/review"]'
